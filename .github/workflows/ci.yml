name: ci

on:
  push:
    paths:
      - "prompts/**"
      - "evals/**"
      - "src/aipulse/facts.py"
      - "src/aipulse/commentary.py"
      - "src/aipulse/providers.py"
      - "src/aipulse/schemas.py"
  pull_request:
    paths:
      - "prompts/**"
      - "evals/**"
      - "src/aipulse/facts.py"
      - "src/aipulse/commentary.py"
      - "src/aipulse/providers.py"
      - "src/aipulse/schemas.py"

jobs:
  evals:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Run eval suite + full test suite
        run: uv run pytest -q
